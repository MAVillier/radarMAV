name: Hourly sync snapshot

on:
  schedule:
    - cron: '17 * * * *'     # cada hora al minut 17
  workflow_dispatch:          # també manual des d'Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # LTS actual; evita deprecacions

      - name: Debug
        run: |
          echo "PWD:" && pwd
          echo "--- ROOT"; ls -la
          echo "--- SCRIPTS"; ls -la scripts || true
          echo "--- DATA"; ls -la data || true
          node -v

      - name: Run sync (generate data/snapshot.json)
        run: node scripts/sync.mjs

      - name: Show items (per log)
        run: |
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('data/snapshot.json','utf8')); console.log('Items:', (j.items||[]).length)"

      - name: Commit snapshot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add data/snapshot.json || true
          if git diff --cached --quiet; then
            echo "No changes"; exit 0; fi
          git commit -m "chore: refresh procurement snapshot"
          git push
``
